{% extends "base.html" %}
{% block title %}Wiki 浏览器 – LLM Wiki{% endblock %}
{% block content %}
<h1>📚 Wiki 浏览器</h1>
<div class="card">
    <div class="card-header">📋 所有页面</div>
    <div id="page-list" class="loading">加载中...</div>
</div>

<!-- Preview Modal -->
<div id="preview-modal" class="modal modal-hidden">
    <div class="modal-overlay" onclick="closePreviewModal()"></div>
    <div class="modal-content card" style="max-height:85vh">
        <div class="card-header card-header-row">
            <span id="preview-title" style="font-size:17px">📄 页面预览</span>
            <button class="btn btn-sm" onclick="closePreviewModal()">✕</button>
        </div>
        <!-- 元数据区 -->
        <div id="preview-meta" style="margin-bottom:12px"></div>
        <!-- 摘要 -->
        <div id="preview-summary" style="margin-bottom:12px;padding:12px;background:rgba(88,166,255,.06);border-left:3px solid var(--accent);border-radius:6px;display:none"></div>
        <!-- 正文 -->
        <div id="preview-body" style="max-height:50vh;overflow:auto">
            <pre id="preview-content" style="white-space:pre-wrap;word-break:break-word;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:13px;margin:0">加载中...</pre>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
// ===================================================================
// Escape helpers
// ===================================================================
function escapeHtml(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function escapeJs(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

// ===================================================================
// Preview modal
// ===================================================================
function showPreviewModal(title) {
    document.getElementById('preview-title').innerHTML = '📄 ' + escapeHtml(title);
    document.getElementById('preview-meta').innerHTML = '';
    document.getElementById('preview-summary').style.display = 'none';
    document.getElementById('preview-content').textContent = '加载中...';
    document.getElementById('preview-modal').classList.remove('modal-hidden');
}
function closePreviewModal() {
    document.getElementById('preview-modal').classList.add('modal-hidden');
}

const typeIcons={entity:'🏷️',concept:'💡',source_summary:'📋',overview:'🗺️',comparison:'⚖️'};
const typeLabels={entity:'实体',concept:'概念',source_summary:'源摘要',overview:'综述',comparison:'对比'};
const statusLabels={draft:'草稿',active:'活跃',stale:'过时',contradicted:'矛盾',archived:'归档'};

async function previewWikiPage(title) {
    showPreviewModal(title);
    try {
        const resp = await fetch('/api/wiki/preview/' + encodeURIComponent(title));
        if (!resp.ok) { throw new Error('页面不存在 (' + resp.status + ')'); }
        const data = await resp.json();

        // Title with icon
        const icon = typeIcons[data.page_type] || '📄';
        document.getElementById('preview-title').innerHTML = icon + ' ' + escapeHtml(data.title);

        // Metadata tags row
        let metaHtml = '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:4px">';
        if (data.page_type) metaHtml += '<span class="tag tag-'+data.page_type+'">'+(typeLabels[data.page_type]||data.page_type)+'</span>';
        if (data.status)   metaHtml += '<span class="tag tag-'+data.status+'">'+(statusLabels[data.status]||data.status)+'</span>';
        if (data.confidence) metaHtml += '<span style="font-size:12px;color:var(--muted)">置信度: <strong>'+escapeHtml(data.confidence)+'</strong></span>';
        metaHtml += '</div>';

        // File info row
        const lines = data.content.split('\n').length;
        const sizeStr = data.size > 1024 ? (data.size/1024).toFixed(1)+' KB' : data.size+' B';
        metaHtml += '<div style="font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:12px">';
        metaHtml += '<span>📄 '+escapeHtml(data.filename)+'</span>';
        metaHtml += '<span>📏 '+sizeStr+' · '+lines+' 行</span>';
        if (data.updated_at) metaHtml += '<span>🕐 更新: '+escapeHtml(data.updated_at)+'</span>';
        if (data.created_at) metaHtml += '<span>📅 创建: '+escapeHtml(data.created_at)+'</span>';
        metaHtml += '</div>';

        // Sources
        if (data.sources && data.sources.length) {
            metaHtml += '<div style="font-size:12px;color:var(--muted);margin-top:4px">📎 来源: ';
            metaHtml += data.sources.map(function(s){
                let t = typeof s==='string' ? s : (s.file||'');
                let sec = (s.sections||[]).join(', ');
                return '<code>'+escapeHtml(t)+(sec?' <span style="color:var(--yellow)">§'+escapeHtml(sec)+'</span>':'')+'</code>';
            }).join(', ');
            metaHtml += '</div>';
        }
        document.getElementById('preview-meta').innerHTML = metaHtml;

        // Summary
        if (data.summary) {
            document.getElementById('preview-summary').style.display = 'block';
            document.getElementById('preview-summary').innerHTML =
                '<strong>📝 摘要</strong><br><span style="color:var(--muted);font-size:13px">'+escapeHtml(data.summary)+'</span>';
        } else {
            document.getElementById('preview-summary').style.display = 'none';
        }

        // Content
        document.getElementById('preview-content').textContent = data.content;
    } catch(e) {
        document.getElementById('preview-content').textContent = '加载失败: ' + e.message;
    }
}

// ===================================================================
// Load page list
// ===================================================================
fetch('/api/wiki/pages')
  .then(r=>r.json())
  .then(d=>{
    let html='<ul class="page-list">';
    d.pages.forEach(p=>{
      let tags=[];
      if(p.page_type) tags.push(`<span class="tag tag-${p.page_type}">${p.page_type}</span>`);
      if(p.status) tags.push(`<span class="tag tag-${p.status}">${p.status}</span>`);
      const titleJs = escapeJs(p.title);
      html+=`<li style="cursor:pointer" onclick="previewWikiPage('${titleJs}')" title="点击预览页面">`;
      html+=`<span style="color:var(--accent);font-weight:500;text-underline-offset:4px;text-decoration-color:var(--border)">${escapeHtml(p.title)}</span> ${tags.join(' ')}`;
      html+=`<br><small style="color:var(--muted)">${escapeHtml(p.summary||'')}</small></li>`;
    });
    html+='</ul>';
    if(d.pages.length===0) html='<p style="color:var(--muted)">暂无页面。请先 <a href="/ingest">上传</a> 一些源文档。</p>';
    document.getElementById('page-list').innerHTML=html;
    document.getElementById('page-list').classList.remove('loading');
  });

// Close modal with Escape key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePreviewModal();
});
</script>
{% endblock %}
