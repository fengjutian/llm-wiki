{% extends "base.html" %}
{% block title %}Lint – LLM Wiki{% endblock %}
{% block content %}
<h1>🔍 Lint 仪表盘</h1>
<div style="display:flex;gap:16px;margin-bottom:16px">
    <button class="btn btn-primary" onclick="runLint()">🔍 运行健康检查</button>
    <button class="btn" onclick="runLint(true)">🔧 运行并自动修复</button>
</div>
<div id="report" class="loading">点击上方按钮运行健康检查...</div>
{% endblock %}
{% block scripts %}
<script>
async function runLint(autoFix=false){
  document.getElementById('report').innerHTML='<div class="loading">检查中...</div>';
  document.getElementById('report').classList.add('loading');
  const resp=await fetch('/api/wiki/lint',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({auto_fix:autoFix})
  });
  const d=await resp.json();
  let html=`<div class="health-score score-${d.health_score}">${d.health_score}</div>`;
  html+=`<p style="text-align:center;color:var(--muted);margin-bottom:16px">${d.summary}</p>`;
  d.issues.forEach(i=>{
    html+=`<div class="card issue-card ${i.severity}">
      <span class="tag tag-${i.severity}">${i.severity.toUpperCase()}</span>
      <strong>${i.type}</strong> – ${i.description}
      <div style="margin-top:4px;font-size:12px;color:var(--muted)">
        影响: ${i.affected_pages.map(p=>`<a href="/page/${encodeURIComponent(p)}">${p}</a>`).join(', ')}
        ${i.suggestion?`<br>💡 ${i.suggestion}`:''}
      </div>
    </div>`;
  });
  if(d.issues.length===0) html+='<p style="text-align:center;color:var(--green)">🎉 Wiki 完全健康，未发现问题！</p>';
  if(d.stats&&Object.keys(d.stats).length){
    html+=`<div class="card" style="margin-top:16px"><div class="card-header">📊 图谱统计</div>
      节点: ${d.stats.nodes} | 边: ${d.stats.edges} | 密度: ${((d.stats.density||0)*100).toFixed(1)}% | 孤立: ${d.stats.orphans}
    </div>`;
  }
  document.getElementById('report').innerHTML=html;
  document.getElementById('report').classList.remove('loading');
}
</script>
{% endblock %}
