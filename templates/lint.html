{% extends "base.html" %}
{% block title %}Lint – LLM Wiki{% endblock %}
{% block content %}
<h1>🔍 Lint 仪表盘</h1>
<div style="display:flex;gap:16px;margin-bottom:16px">
    <button class="btn btn-primary" onclick="runLint()" id="btn-lint">🔍 运行健康检查</button>
    <button class="btn" onclick="runLint(true)" id="btn-fix">🔧 运行并自动修复</button>
</div>
<div id="report">点击上方按钮运行健康检查...</div>
{% endblock %}
{% block scripts %}
<script>
let pollTimer = null;

// Check for pending result on page load (from sessionStorage cross-page notification)
(function(){
    const pending = sessionStorage.getItem('lint_pending_task');
    if (pending) {
        try {
            const t = JSON.parse(pending);
            sessionStorage.removeItem('lint_pending_task');
            pollLintTask(t.taskId, t.autoFix);
            return;
        } catch(e) {}
    }
    // Also check if there's a stored result (user navigated back)
    const stored = sessionStorage.getItem('lint_last_result');
    if (stored) {
        try {
            renderReport(JSON.parse(stored));
        } catch(e) {}
    }
})();

async function runLint(autoFix) {
    // Clear previous
    if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
    document.getElementById('report').innerHTML =
        '<div class="loading" style="padding:40px">' +
        '<div class="spinner"></div> 检查中… 可<a href="/" style="color:var(--accent)">切换页面</a>，完成后自动显示结果</div>';

    // Disable buttons during check
    document.getElementById('btn-lint').disabled = true;
    document.getElementById('btn-fix').disabled = true;

    try {
        const resp = await fetch('/api/wiki/lint', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({auto_fix: autoFix, async: true})
        });
        const data = await resp.json();
        if (data.task_id) {
            // Store in sessionStorage so other pages know
            sessionStorage.setItem('lint_pending_task', JSON.stringify({taskId: data.task_id, autoFix: autoFix}));
            pollLintTask(data.task_id, autoFix);
        }
    } catch(e) {
        document.getElementById('report').innerHTML = '<p class="error">启动检查失败: ' + e.message + '</p>';
        document.getElementById('btn-lint').disabled = false;
        document.getElementById('btn-fix').disabled = false;
    }
}

async function pollLintTask(taskId, autoFix) {
    try {
        const resp = await fetch('/api/wiki/lint/status/' + taskId);
        if (!resp.ok) { throw new Error('status check failed'); }
        const data = await resp.json();

        if (data.status === 'done' && data.result) {
            // Done!
            sessionStorage.removeItem('lint_pending_task');
            sessionStorage.setItem('lint_last_result', JSON.stringify(data.result));
            renderReport(data.result);
            document.getElementById('btn-lint').disabled = false;
            document.getElementById('btn-fix').disabled = false;
            // Show toast on other pages via custom event
            window.dispatchEvent(new CustomEvent('lint-done', {detail: data.result}));
        } else if (data.status === 'error') {
            document.getElementById('report').innerHTML = '<p class="error">检查失败: ' + (data.error || 'unknown') + '</p>';
            document.getElementById('btn-lint').disabled = false;
            document.getElementById('btn-fix').disabled = false;
            sessionStorage.removeItem('lint_pending_task');
        } else {
            // Still running — poll again in 2s
            pollTimer = setTimeout(function(){ pollLintTask(taskId, autoFix); }, 2000);
        }
    } catch(e) {
        pollTimer = setTimeout(function(){ pollLintTask(taskId, autoFix); }, 3000);
    }
}

function renderReport(d) {
    let html = '<div class="health-score score-' + d.health_score + '">' + d.health_score + '</div>';
    html += '<p style="text-align:center;color:var(--muted);margin-bottom:16px">' + escapeHtml(d.summary||'') + '</p>';
    (d.issues||[]).forEach(function(i){
        html += '<div class="card issue-card ' + i.severity + '">' +
            '<span class="tag tag-' + i.severity + '">' + (i.severity||'').toUpperCase() + '</span> ' +
            '<strong>' + escapeHtml(i.type||'') + '</strong> – ' + escapeHtml(i.description||'') +
            '<div style="margin-top:4px;font-size:12px;color:var(--muted)">' +
            '影响: ' + (i.affected_pages||[]).map(function(p){return '<span style="color:var(--accent);cursor:pointer;text-decoration:underline" onclick="previewWikiPage(\'' + escapeJs(p) + '\')">' + escapeHtml(p) + '</span>'}).join(', ') +
            (i.suggestion ? '<br>💡 ' + escapeHtml(i.suggestion) : '') +
            '</div></div>';
    });
    if (!d.issues || d.issues.length === 0) html += '<p style="text-align:center;color:var(--green)">🎉 Wiki 完全健康，未发现问题！</p>';
    if (d.stats && Object.keys(d.stats).length) {
        html += '<div class="card" style="margin-top:16px"><div class="card-header">📊 图谱统计</div>' +
            '节点: ' + d.stats.nodes + ' | 边: ' + d.stats.edges + ' | 密度: ' + ((d.stats.density||0)*100).toFixed(1) + '% | 孤立: ' + d.stats.orphans +
            '</div>';
    }
    document.getElementById('report').innerHTML = html;
}

// Lint page also supports previewing wiki pages in modal
function escapeHtml(s) { const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function escapeJs(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }
</script>
{% endblock %}
