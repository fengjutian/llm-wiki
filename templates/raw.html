{% extends "base.html" %}
{% block title %}Raw 源文件 – LLM Wiki{% endblock %}
{% block content %}
<h1>📁 Raw 源文件</h1>
<div class="card">
    <div class="card-header card-header-row">
        <span>所有上传的源文档</span>
        <div class="header-actions">
            <button class="btn btn-primary btn-sm" onclick="openUploadModal()">📤 上传文件</button>
            <button class="btn btn-primary btn-sm" onclick="batchIngest()" id="btn-batch">🚀 全部 AI 生成 Wiki</button>
            <label class="dry-run-label">
                <input type="checkbox" id="dry-run-batch"> Dry-run
            </label>
        </div>
    </div>
    <div id="file-list" class="loading">加载中...</div>
</div>

<!-- Ingest Result Modal -->
<div id="result-modal" class="modal modal-hidden">
    <div class="modal-overlay" onclick="closeResultModal()"></div>
    <div class="modal-content card">
        <div class="card-header card-header-row">
            <span id="modal-title">Ingest 结果</span>
            <button class="btn btn-sm" onclick="closeResultModal()">✕</button>
        </div>
        <div id="modal-body"></div>
    </div>
</div>

<!-- Preview Modal -->
<div id="preview-modal" class="modal modal-hidden">
    <div class="modal-overlay" onclick="closePreviewModal()"></div>
    <div class="modal-content card" style="max-width:900px;max-height:85vh">
        <div class="card-header card-header-row">
            <span id="preview-title" style="font-size:17px">📄 文件预览</span>
            <button class="btn btn-sm" onclick="closePreviewModal()">✕</button>
        </div>
        <!-- 元数据区 -->
        <div id="preview-meta" style="margin-bottom:12px"></div>
        <!-- 摘要 -->
        <div id="preview-summary" style="margin-bottom:12px;padding:12px;background:rgba(88,166,255,.06);border-left:3px solid var(--accent);border-radius:6px;display:none"></div>
        <!-- 正文 -->
        <div id="preview-body" style="max-height:50vh;overflow:auto">
            <pre id="preview-content" style="white-space:pre-wrap;word-break:break-word;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:13px;margin:0">加载中...</pre>
        </div>
    </div>
</div>

<!-- Upload Modal -->
<div id="upload-modal" class="modal modal-hidden">
    <div class="modal-overlay" onclick="closeUploadModal()"></div>
    <div class="modal-content card" style="max-width:520px">
        <div class="card-header card-header-row">
            <span>📤 上传源文件</span>
            <button class="btn btn-sm" onclick="closeUploadModal()">✕</button>
        </div>
        <div id="upload-drop-zone" style="border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;transition:all .2s;cursor:pointer;margin-bottom:12px">
            <div style="font-size:36px;margin-bottom:8px">📂</div>
            <div style="color:var(--text);font-weight:500;margin-bottom:4px">拖拽文件到此处</div>
            <div style="color:var(--muted);font-size:12px">或点击选择文件</div>
            <input type="file" id="upload-input" style="display:none" multiple>
        </div>
        <div id="upload-queue" style="max-height:200px;overflow-y:auto"></div>
        <div id="upload-status" style="margin-top:8px;font-size:13px;color:var(--muted)"></div>
    </div>
</div>
{% endblock %}
{% block head %}
<style>
.header-actions{display:flex;gap:8px}
.dry-run-label{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);cursor:pointer}
.file-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap}
.file-row:last-child{border-bottom:none}
.file-info{flex:1;min-width:200px}
.file-name{font-weight:600;word-break:break-all}
.file-meta{font-size:12px;color:var(--muted);margin-top:2px}
.file-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.status-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500}
.status-pending{background:rgba(88,166,255,.12);color:var(--accent)}
.status-ingested{background:rgba(63,185,80,.12);color:var(--green)}
.status-modified{background:rgba(210,153,29,.12);color:var(--yellow)}
.wiki-links{font-size:12px;color:var(--muted);margin-top:4px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
#upload-drop-zone.drag-over{border-color:var(--accent);background:rgba(88,166,255,.08)}
.upload-queue-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;margin:4px 0;border-radius:4px;background:var(--surface);border:1px solid var(--border);font-size:13px}
.upload-queue-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.upload-queue-item .size{color:var(--muted);font-size:12px;margin-right:8px;flex-shrink:0}
.upload-queue-item .status{font-size:12px;flex-shrink:0}
.upload-queue-item .status.ok{color:var(--green)}
.upload-queue-item .status.err{color:var(--red)}
</style>
{% endblock %}
{% block scripts %}
<script>
const statusLabels = { pending: '待处理', ingested: '已生成', modified: '已修改', draft:'草稿', active:'活跃', stale:'过时', contradicted:'矛盾', archived:'归档' };
const pageTypeIcons = { entity: '🏷️', concept: '💡', source_summary: '📋', overview: '🗺️', comparison: '⚖️' };
const pageTypeLabels = { entity: '实体', concept: '概念', source_summary: '源摘要', overview: '综述', comparison: '对比' };

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function safeId(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        const c = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + c;
        hash |= 0;
    }
    return 'f' + Math.abs(hash).toString(36);
}

// ===================================================================
// File List
// ===================================================================

async function loadFiles() {
    const container = document.getElementById('file-list');
    try {
        const resp = await fetch('/api/raw/files');
        const data = await resp.json();
        const rawFiles = data.raw_files || data.files || []; // backward compat
        const wikiFiles = data.wiki_files || [];

        if (rawFiles.length === 0 && wikiFiles.length === 0) {
            container.innerHTML = '<p style="color:var(--muted);padding:20px;text-align:center">暂无文件，点击 <b>📤 上传文件</b> 开始。</p>';
            container.classList.remove('loading');
            return;
        }

        let html = '';

        // ---- Raw source files ----
        if (rawFiles.length > 0) {
            html += '<h2 style="margin:16px 0 8px">📁 Raw 源文件 <span style="font-size:14px;color:var(--muted);font-weight:normal">(' + rawFiles.length + ')</span></h2>';
            rawFiles.forEach((f) => {
                const statusClass = 'status-' + f.status;
                const rowId = safeId(f.path);
                html += '<div class="file-row" id="row-' + rowId + '">' +
                    '<div class="file-info">' +
                        '<div class="file-name" style="cursor:pointer" onclick="previewRawFile(\'' + escapeJs(f.path) + '\')" title="点击预览文件">📄 <span style="color:var(--accent);font-weight:500;text-decoration:underline;text-underline-offset:4px;text-decoration-color:var(--border)">' + escapeHtml(f.path) + '</span></div>' +
                        '<div class="file-meta">' + formatSize(f.size) + ' · <code>' + escapeHtml(f.hash) + '</code></div>' +
                        '<div class="wiki-links">' +
                            '<span class="status-badge ' + statusClass + '">' + (statusLabels[f.status] || f.status) + '</span>' +
                            (f.wiki_pages.length ? ' → ' + f.wiki_pages.map(function(p){return '<span style="color:var(--accent);cursor:pointer;text-decoration:underline;text-underline-offset:3px" onclick="event.stopPropagation();previewWikiFile(\'' + escapeJs(p) + '\')" title="点击预览 [[ ' + escapeHtml(p) + ' ]]">[[' + escapeHtml(p) + ']]</span>'}).join(', ') : '') +
                        '</div>' +
                    '</div>' +
                    '<div class="file-actions">' +
                        '<button class="btn btn-sm" onclick="previewRawFile(\'' + escapeJs(f.path) + '\')" title="预览文件内容">👁 预览</button>' +
                        '<button class="btn btn-sm btn-primary" onclick="ingestFile(\'' + escapeJs(f.path) + '\', \'' + rowId + '\')" id="btn-' + rowId + '">' +
                            '🤖 ' + (f.status === 'ingested' ? '重新生成' : 'AI 生成 Wiki') +
                        '</button>' +
                    '</div>' +
                '</div>';
            });
        }

        // ---- Generated wiki pages ----
        if (wikiFiles.length > 0) {
            html += '<h2 style="margin:24px 0 8px">📝 生成的 Wiki 页面 <span style="font-size:14px;color:var(--muted);font-weight:normal">(' + wikiFiles.length + ')</span></h2>';
            wikiFiles.forEach((f) => {
                const icon = pageTypeIcons[f.page_type] || '📄';
                const typeLabel = pageTypeLabels[f.page_type] || f.page_type;
                const rowId = safeId('wiki-' + f.title);
                html += '<div class="file-row" id="row-' + rowId + '">' +
                    '<div class="file-info" style="cursor:pointer" onclick="previewWikiFile(\'' + escapeJs(f.title) + '\')" title="点击预览页面">' +
                        '<div class="file-name">' + icon + ' <span style="color:var(--accent);font-weight:500;text-decoration:underline;text-underline-offset:4px;text-decoration-color:var(--border)">' + escapeHtml(f.title) + '</span></div>' +
                        '<div class="file-meta">' + formatSize(f.size) + ' · ' + escapeHtml(f.filename) + '</div>' +
                        '<div class="wiki-links">' +
                            '<span class="status-badge status-' + f.status + '">' + typeLabel + ' · ' + (f.status || 'draft') + '</span>' +
                            (f.summary ? ' <span style="font-size:12px;color:var(--muted)">' + escapeHtml(f.summary) + '</span>' : '') +
                        '</div>' +
                    '</div>' +
                    '<div class="file-actions">' +
                        '<button class="btn btn-sm" onclick="previewWikiFile(\'' + escapeJs(f.title) + '\')" title="预览 Markdown 源码">👁 预览</button>' +
                    '</div>' +
                '</div>';
            });
        }

        container.innerHTML = html;
        container.classList.remove('loading');
    } catch(e) {
        container.innerHTML = '<p class="error">加载失败: ' + e.message + '</p>';
        container.classList.remove('loading');
    }
}

// ===================================================================
// Preview – Raw files
// ===================================================================

async function previewRawFile(filename) {
    showPreviewModal('📄 ' + filename);
    try {
        const resp = await fetch('/api/raw/preview/' + encodeURIComponent(filename));
        if (!resp.ok) { throw new Error('文件不存在 (' + resp.status + ')'); }
        const data = await resp.json();
        document.getElementById('preview-meta').textContent = '大小: ' + formatSize(data.size) + ' · ' + data.content.split('\n').length + ' 行';
        document.getElementById('preview-content').textContent = data.content;
    } catch(e) {
        document.getElementById('preview-content').textContent = '加载失败: ' + e.message;
    }
}

// ===================================================================
// Preview – Wiki pages (raw markdown)
// ===================================================================

async function previewWikiFile(title) {
    showPreviewModal('📝 ' + title);
    try {
        const resp = await fetch('/api/wiki/preview/' + encodeURIComponent(title));
        if (!resp.ok) { throw new Error('页面不存在 (' + resp.status + ')'); }
        const data = await resp.json();

        // Title with icon
        const icon = pageTypeIcons[data.page_type] || '📄';
        document.getElementById('preview-title').innerHTML = icon + ' ' + escapeHtml(data.title);

        // Metadata tags row
        let metaHtml = '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:4px">';
        if (data.page_type) metaHtml += '<span class="tag tag-'+data.page_type+'">'+(pageTypeLabels[data.page_type]||data.page_type)+'</span>';
        if (data.status)   metaHtml += '<span class="tag tag-'+data.status+'">'+(statusLabels[data.status]||data.status)+'</span>';
        if (data.confidence) metaHtml += '<span style="font-size:12px;color:var(--muted)">置信度: <strong>'+escapeHtml(data.confidence)+'</strong></span>';
        metaHtml += '</div>';

        // File info row
        const lines = data.content.split('\n').length;
        const sizeStr = data.size > 1024 ? (data.size/1024).toFixed(1)+' KB' : data.size+' B';
        metaHtml += '<div style="font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:12px">';
        metaHtml += '<span>📄 '+escapeHtml(data.filename)+'</span>';
        metaHtml += '<span>📏 '+sizeStr+' · '+lines+' 行</span>';
        if (data.updated_at) metaHtml += '<span>🕐 更新: '+escapeHtml(data.updated_at)+'</span>';
        if (data.created_at) metaHtml += '<span>📅 创建: '+escapeHtml(data.created_at)+'</span>';
        metaHtml += '</div>';

        // Sources
        if (data.sources && data.sources.length) {
            metaHtml += '<div style="font-size:12px;color:var(--muted);margin-top:4px">📎 来源: ';
            metaHtml += data.sources.map(function(s){
                let t = typeof s==='string' ? s : (s.file||'');
                let sec = (s.sections||[]).join(', ');
                return '<code>'+escapeHtml(t)+(sec?' <span style="color:var(--yellow)">§'+escapeHtml(sec)+'</span>':'')+'</code>';
            }).join(', ');
            metaHtml += '</div>';
        }
        document.getElementById('preview-meta').innerHTML = metaHtml;

        // Summary
        const summaryEl = document.getElementById('preview-summary');
        if (data.summary) {
            summaryEl.style.display = 'block';
            summaryEl.innerHTML = '<strong>📝 摘要</strong><br><span style="color:var(--muted);font-size:13px">'+escapeHtml(data.summary)+'</span>';
        } else {
            summaryEl.style.display = 'none';
        }

        // Content
        document.getElementById('preview-content').textContent = data.content;
    } catch(e) {
        document.getElementById('preview-content').textContent = '加载失败: ' + e.message;
    }
}

function showPreviewModal(title) {
    document.getElementById('preview-title').textContent = title;
    document.getElementById('preview-meta').textContent = '';
    document.getElementById('preview-content').textContent = '加载中...';
    document.getElementById('preview-modal').classList.remove('modal-hidden');
}

function closePreviewModal() {
    document.getElementById('preview-modal').classList.add('modal-hidden');
}

// ===================================================================
// Upload
// ===================================================================

function openUploadModal() {
    document.getElementById('upload-queue').innerHTML = '';
    document.getElementById('upload-status').textContent = '';
    document.getElementById('upload-input').value = '';
    document.getElementById('upload-modal').classList.remove('modal-hidden');
}

function closeUploadModal() {
    document.getElementById('upload-modal').classList.add('modal-hidden');
}

// Drag & drop
(function(){
    var zone = document.getElementById('upload-drop-zone');
    if (!zone) return;
    var input = document.getElementById('upload-input');

    zone.addEventListener('click', function(){ input.click(); });
    input.addEventListener('change', function(){ handleFiles(input.files); });

    zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', function(e){ e.preventDefault(); zone.classList.remove('drag-over'); });
    zone.addEventListener('drop', function(e){
        e.preventDefault();
        zone.classList.remove('drag-over');
        if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
    });
})();

function handleFiles(files) {
    for (var i = 0; i < files.length; i++) {
        uploadFile(files[i]);
    }
}

async function uploadFile(file) {
    var queue = document.getElementById('upload-queue');
    var itemId = 'uq-' + safeId(file.name + Date.now());
    var item = document.createElement('div');
    item.className = 'upload-queue-item';
    item.id = itemId;
    item.innerHTML = '<span class="name">' + escapeHtml(file.name) + '</span>' +
        '<span class="size">' + formatSize(file.size) + '</span>' +
        '<span class="status"><span class="spinner"></span></span>';
    queue.appendChild(item);

    var formData = new FormData();
    formData.append('file', file);

    try {
        var resp = await fetch('/api/raw/upload', { method: 'POST', body: formData });
        var data = await resp.json();
        if (data.status === 'uploaded') {
            document.getElementById(itemId).querySelector('.status').innerHTML = '<span class="ok">✅ 已上传</span>';
        } else {
            document.getElementById(itemId).querySelector('.status').innerHTML = '<span class="err">❌ 失败</span>';
        }
    } catch(e) {
        document.getElementById(itemId).querySelector('.status').innerHTML = '<span class="err">❌ ' + e.message + '</span>';
    }

    document.getElementById('upload-status').textContent = '上传完成，刷新列表中...';
    loadFiles();
}

// ===================================================================
// Ingest
// ===================================================================

async function ingestFile(filename, rowId) {
    const dryRun = document.getElementById('dry-run-batch').checked;
    const btn = document.getElementById('btn-' + rowId);
    if (!btn) return;
    const origHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> AI 处理中（最长等待 3 分钟）...';

    const controller = new AbortController();
    const timeoutId = setTimeout(function(){ controller.abort(); }, 180000);

    try {
        const resp = await fetch('/api/raw/ingest/' + encodeURIComponent(filename), {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({dry_run: dryRun}),
            signal: controller.signal
        });
        clearTimeout(timeoutId);
        const data = await resp.json();
        showResult(filename, data);
        loadFiles();
    } catch(e) {
        clearTimeout(timeoutId);
        if (e.name === 'AbortError') {
            showResult(filename, {errors: ['请求超时（3 分钟）。LLM 服务可能暂时不可用，请稍后重试。'], status: 'timeout'});
        } else {
            showResult(filename, {errors: [e.message], status: 'error'});
        }
        btn.disabled = false;
        btn.innerHTML = origHTML;
    }
}

async function batchIngest() {
    const dryRun = document.getElementById('dry-run-batch').checked;
    const btn = document.getElementById('btn-batch');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 批量处理中...';

    try {
        const resp = await fetch('/api/wiki/ingest/batch', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({dry_run: dryRun})
        });
        const data = await resp.json();
        let html = '<p><strong>已处理 ' + data.processed + ' 个文件</strong></p><ul>';
        data.results.forEach(function(r){
            const icon = r.status === 'skipped' ? '⏭️' : r.errors.length ? '❌' : '✅';
            html += '<li>' + icon + ' <strong>' + escapeHtml(r.source) + '</strong> — ' + r.status + ' | 新增 ' + r.new_pages + ' 页，更新 ' + r.updated_pages + ' 页';
            if (r.errors.length) html += '<br><span class="error">' + r.errors.join(', ') + '</span>';
            html += '</li>';
        });
        html += '</ul>';
        if (dryRun) html += '<p style="color:var(--yellow)">⚠️ Dry-run 模式，未实际写入。</p>';
        showResult('批量 Ingest', {html: html});
        loadFiles();
    } catch(e) {
        showResult('批量 Ingest', {errors: [e.message], status: 'error'});
    }
}

function showResult(title, data) {
    document.getElementById('modal-title').textContent = title;
    let html = '';
    if (data.html) {
        html = data.html;
    } else {
        html += '<p><strong>状态:</strong> ' + (data.status || 'unknown') + '</p>';
        if (data.new_pages && data.new_pages.length) html += '<p><strong>新增页面 (' + data.new_pages.length + '):</strong> ' + data.new_pages.map(function(p){return '<a href="/page/' + encodeURIComponent(p) + '">' + escapeHtml(p) + '</a>'}).join(', ') + '</p>';
        if (data.updated_pages && data.updated_pages.length) html += '<p><strong>更新页面 (' + data.updated_pages.length + '):</strong> ' + data.updated_pages.map(function(p){return '<a href="/page/' + encodeURIComponent(p) + '">' + escapeHtml(p) + '</a>'}).join(', ') + '</p>';
        if (data.contradictions && data.contradictions.length) html += '<p><strong>⚠️ 矛盾 (' + data.contradictions.length + '):</strong></p><ul>' + data.contradictions.map(function(c){return '<li>' + escapeHtml(c.wiki_page || '') + ': ' + escapeHtml(c.claim_in_source || '') + '</li>'}).join('') + '</ul>';
        if (data.errors && data.errors.length) html += '<p class="error">' + data.errors.map(escapeHtml).join('<br>') + '</p>';
        if (data.dry_run) html += '<p style="color:var(--yellow)">⚠️ 这是 Dry-run 预览，未实际写入。</p>';
    }
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('result-modal').classList.remove('modal-hidden');
}

function closeResultModal() {
    document.getElementById('result-modal').classList.add('modal-hidden');
}

// ===================================================================
// Helpers
// ===================================================================

function escapeHtml(s) {
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
}

function escapeJs(s) {
    return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
}

// Close modals on Escape key
document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') {
        closeResultModal();
        closePreviewModal();
        closeUploadModal();
    }
});

loadFiles();
</script>
{% endblock %}
