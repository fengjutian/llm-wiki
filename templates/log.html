{% extends "base.html" %}
{% block title %}操作日志 – LLM Wiki{% endblock %}
{% block content %}
<h1>📋 操作日志</h1>
<p style="color:var(--muted);margin-bottom:16px">所有 Wiki 操作的按时间倒序记录（Ingest / Lint / Query / Merge）</p>

<div class="card">
    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
        <span>📜 日志条目</span>
        <button class="btn btn-sm" onclick="loadLog()" id="btn-refresh">🔄 刷新</button>
    </div>
    <div id="log-entries" class="loading">
        <div class="spinner"></div> 加载中...
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const opIcons = { ingest: '📥', lint: '🔍', query: '💬', merge: '🔀' };
const opLabels = { ingest: 'Ingest', lint: 'Lint', query: 'Query', merge: 'Merge' };

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

async function loadLog() {
    const container = document.getElementById('log-entries');
    container.innerHTML = '<div class="spinner"></div> 加载中...';
    document.getElementById('btn-refresh').disabled = true;

    try {
        const resp = await fetch('/api/wiki/log?last_n=100');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        renderLog(data.entries || []);
    } catch (e) {
        container.innerHTML = '<p class="error">加载失败: ' + escapeHtml(e.message) + '</p>';
    } finally {
        document.getElementById('btn-refresh').disabled = false;
    }
}

function renderLog(entries) {
    const container = document.getElementById('log-entries');

    if (!entries.length) {
        container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:24px">暂无日志记录</p>';
        return;
    }

    let html = '<div style="display:flex;flex-direction:column;gap:0">';
    entries.forEach(function(e, i) {
        const icon = opIcons[e.operation] || '📌';
        const label = opLabels[e.operation] || e.operation;
        const isLast = i === entries.length - 1;

        html += '<div style="display:flex;gap:12px;padding:12px 0;' + (isLast ? '' : 'border-bottom:1px solid var(--border)') + '">';
        // Timeline dot
        html += '<div style="flex-shrink:0;width:32px;text-align:center;font-size:16px;padding-top:2px">' + icon + '</div>';
        // Content
        html += '<div style="flex:1;min-width:0">';
        html += '<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:baseline;margin-bottom:4px">';
        html += '<span class="tag" style="background:rgba(88,166,255,.12);color:var(--accent)">' + escapeHtml(label) + '</span>';
        html += '<strong style="font-size:14px">' + escapeHtml(e.title || '—') + '</strong>';
        if (e.branch && e.branch !== 'main') {
            html += '<code style="font-size:11px;color:var(--muted)">🌿 ' + escapeHtml(e.branch) + '</code>';
        }
        html += '</div>';
        if (e.details) {
            html += '<pre style="margin:4px 0 0;padding:8px 12px;font-size:12px;white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.15);border-radius:4px">' + escapeHtml(e.details) + '</pre>';
        }
        html += '<div style="font-size:11px;color:var(--muted);margin-top:4px">🕐 ' + escapeHtml(e.timestamp) + '</div>';
        html += '</div>';
        html += '</div>';
    });
    html += '</div>';

    container.innerHTML = html;
}

// Load on page ready
document.addEventListener('DOMContentLoaded', loadLog);
</script>
{% endblock %}
