{% extends "base.html" %}
{% block title %}LLM 配置 – LLM Wiki{% endblock %}
{% block content %}
<h1>⚙️ LLM 配置</h1>
<div class="card">
    <div class="card-header">API 设置</div>
    <div style="display:grid;gap:12px">
        <div>
            <label style="color:var(--muted);font-size:12px">API Base URL</label>
            <input type="text" id="cfg-base" placeholder="https://api.deepseek.com/v1">
        </div>
        <div>
            <label style="color:var(--muted);font-size:12px">API Key</label>
            <input type="password" id="cfg-key" placeholder="sk-...">
            <small style="color:var(--muted)">仅存储在本地 settings.json</small>
        </div>
        <div>
            <label style="color:var(--muted);font-size:12px">默认模型</label>
            <input type="text" id="cfg-model" placeholder="deepseek-v4-pro">
        </div>
        <div>
            <label style="color:var(--muted);font-size:12px">轻量模型（摘要等简单任务）</label>
            <input type="text" id="cfg-small-model" placeholder="deepseek-chat">
        </div>
        <div style="display:flex;gap:12px">
            <div style="flex:1">
                <label style="color:var(--muted);font-size:12px">Max Tokens</label>
                <input type="number" id="cfg-max-tokens" placeholder="16384" min="1024" max="131072">
            </div>
            <div style="flex:1">
                <label style="color:var(--muted);font-size:12px">Temperature (0-2)</label>
                <input type="number" id="cfg-temp" placeholder="0.3" min="0" max="2" step="0.1">
            </div>
        </div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
        <button class="btn" onclick="testConnection()">🔌 测试连接</button>
    </div>
    <div id="config-msg" style="margin-top:8px;font-size:12px"></div>
</div>
<div class="card">
    <div class="card-header">当前状态</div>
    <div id="current-config" class="loading">加载中...</div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadConfig(){
    const r = await fetch('/api/config');
    const d = await r.json();
    document.getElementById('cfg-base').value = d.llm_api_base || '';
    document.getElementById('cfg-model').value = d.llm_model || '';
    document.getElementById('cfg-key').placeholder = d.has_key ? '(已保存，重新输入覆盖)' : 'sk-...';
    document.getElementById('cfg-small-model').value = d.llm_small_model || '';
    document.getElementById('cfg-max-tokens').value = d.llm_max_tokens || '';
    document.getElementById('cfg-temp').value = d.llm_temperature || '';
    document.getElementById('current-config').innerHTML =
        `<p>模型: <strong>${d.llm_model}</strong> | Base: ${d.llm_api_base} | API Key: ${d.has_key?'已配置':'❌ 未配置'} | 来源: ${d.source}</p>`;
    document.getElementById('current-config').classList.remove('loading');
}
async function saveConfig(){
    const data = {
        llm_api_base: document.getElementById('cfg-base').value.trim(),
        llm_model: document.getElementById('cfg-model').value.trim(),
        llm_small_model: document.getElementById('cfg-small-model').value.trim(),
        llm_max_tokens: parseInt(document.getElementById('cfg-max-tokens').value)||16384,
        llm_temperature: parseFloat(document.getElementById('cfg-temp').value)||0.3,
    };
    const key = document.getElementById('cfg-key').value.trim();
    if(key) data.llm_api_key = key;
    const r = await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const d = await r.json();
    document.getElementById('config-msg').innerHTML =
        `<span style="color:var(--green)">✅ 配置已保存: ${d.model} @ ${d.base}</span>`;
    loadConfig();
}
async function testConnection(){
    document.getElementById('config-msg').innerHTML = '<span style="color:var(--yellow)">⏳ 测试中...</span>';
    const resp = await fetch('/api/wiki/lint',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'})
        .then(r=>r.json()).catch(()=>null);
    if(resp && resp.health_score) {
        document.getElementById('config-msg').innerHTML = '<span style="color:var(--green)">✅ 连接成功！模型可用。</span>';
    } else {
        document.getElementById('config-msg').innerHTML =
            `<span style="color:var(--red)">❌ 连接失败，请检查 API Key 和 Base URL。</span>`;
    }
}
loadConfig();
</script>
{% endblock %}
