<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LLM Wiki{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>/* prevent theme flash */ (function(){var t=localStorage.getItem('wiki-theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme:light)').matches)document.documentElement.setAttribute('data-theme','light')})()</script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><a href="/">📚 LLM Wiki</a></h2>
            </div>
            <nav class="sidebar-nav">
                <a href="/workbench" class="nav-item" id="nav-workbench">🏠 Workbench</a>
                <a href="/wikifile" class="nav-item">📚 Wiki 浏览器</a>
                <a href="/graph" class="nav-item">🕸️ 图谱视图</a>
                <a href="/raw" class="nav-item">📁 源文件</a>
                <a href="/ingest" class="nav-item">📥 上传文件</a>
                <a href="/query" class="nav-item">💬 Query</a>
                <a href="/lint" class="nav-item">🔍 Lint</a>
                <a href="/branches" class="nav-item">🌿 分支</a>
                <a href="/log" class="nav-item">📋 操作日志</a>
                <a href="/config" class="nav-item">⚙️ 配置</a>
                <a href="/docs" class="nav-item" target="_blank">📖 API 文档</a>
            </nav>
            <div class="sidebar-footer">
                <button class="theme-toggle" onclick="toggleTheme()" title="切换深色/浅色主题">
                    <span class="icon" id="theme-icon">🌙</span>
                    <span id="theme-label">深色模式</span>
                </button>
                <div id="health-badge">⚪ 加载中...</div>
            </div>
        </aside>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% block scripts %}{% endblock %}
    <script>
        function applyTheme(theme){
            document.documentElement.setAttribute('data-theme',theme);
            localStorage.setItem('wiki-theme',theme);
            var icon=document.getElementById('theme-icon');
            var label=document.getElementById('theme-label');
            if(icon)icon.textContent=theme==='light'?'☀️':'🌙';
            if(label)label.textContent=theme==='light'?'浅色模式':'深色模式';
        }

        function toggleTheme(){
            var cur=document.documentElement.getAttribute('data-theme');
            applyTheme(cur==='light'?'dark':'light');
        }

        document.addEventListener('DOMContentLoaded',function(){
            var saved=localStorage.getItem('wiki-theme');
            if(!saved){
                saved=window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';
            }
            applyTheme(saved);

            window.matchMedia('(prefers-color-scheme:light)').addEventListener('change',function(e){
                if(!localStorage.getItem('wiki-theme')){
                    applyTheme(e.matches?'light':'dark');
                }
            });
        });

        // Load wiki stats for the sidebar badge (lightweight, no LLM call)
        fetch('/api/graph/stats')
          .then(r=>r.json())
          .then(d=>{document.getElementById('health-badge').textContent = '📊 '+d.nodes+'页 '+d.edges+'链'})
          .catch(function(){document.getElementById('health-badge').textContent = '⚪'})

        // ================================================================
        // Global toast notification (for background tasks completing)
        // ================================================================
        function showToast(msg, link, linkText) {
            var existing = document.getElementById('global-toast');
            if (existing) existing.remove();
            var toast = document.createElement('div');
            toast.id = 'global-toast';
            toast.innerHTML =
                '<span>' + msg + '</span>' +
                (link ? ' <a href="' + link + '" style="color:var(--accent);font-weight:600">' + (linkText||'查看') + '</a>' : '') +
                '<button onclick="this.parentElement.remove()" style="margin-left:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px">&times;</button>';
            document.body.appendChild(toast);
            setTimeout(function(){ if (toast.parentElement) toast.remove(); }, 10000);
        }

        // Listen for lint-done event (fired by lint.html when poll completes on that page)
        window.addEventListener('lint-done', function(e) {
            var d = e.detail;
            var msg = '✅ Lint 完成！健康评分: ' + d.health_score + ' · ' + (d.issues||[]).length + ' 个问题';
            showToast(msg, '/lint', '查看详情');
        });

        // Also check sessionStorage for pending lint tasks (cross-page)
        (function(){
            var pending = sessionStorage.getItem('lint_pending_task');
            if (pending) {
                showToast('🔍 Lint 检查进行中… 可正常浏览其他页面', null, null);
                // Start polling in background
                try {
                    var t = JSON.parse(pending);
                    pollInBackground(t.taskId);
                } catch(e) {}
            }
        })();

        function pollInBackground(taskId) {
            fetch('/api/wiki/lint/status/' + taskId)
              .then(function(r){ return r.json(); })
              .then(function(data) {
                  if (data.status === 'done' && data.result) {
                      sessionStorage.removeItem('lint_pending_task');
                      sessionStorage.setItem('lint_last_result', JSON.stringify(data.result));
                      var d = data.result;
                      var msg = '✅ Lint 完成！健康评分: ' + d.health_score + ' · ' + (d.issues||[]).length + ' 个问题';
                      showToast(msg, '/lint', '查看详情');
                  } else if (data.status === 'error') {
                      sessionStorage.removeItem('lint_pending_task');
                      showToast('❌ Lint 检查失败: ' + (data.error||'unknown'), null, null);
                  } else {
                      setTimeout(function(){ pollInBackground(taskId); }, 3000);
                  }
              })
              .catch(function() {
                  setTimeout(function(){ pollInBackground(taskId); }, 5000);
              });
        }
    </script>
</body>
</html>
